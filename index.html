<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking GP Webmotors</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E8112D;
  --red-light: rgba(232,17,45,0.07);
  --red-border: rgba(232,17,45,0.22);
  --green: #007A3D;
  --green-light: rgba(0,122,61,0.07);
  --green-border: rgba(0,122,61,0.22);
  --gold: #B56800;
  --gold-light: rgba(181,104,0,0.07);
  --gold-border: rgba(181,104,0,0.22);
  --blue: #1B5FCC;
  --blue-light: rgba(27,95,204,0.07);
  --blue-border: rgba(27,95,204,0.2);

  --bg: #F0F2F5;
  --surface: #FFFFFF;
  --surface2: #F8F9FA;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.15);
  --text: #111111;
  --text2: #444444;
  --muted: #777777;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* TOPBAR */
.topbar {
    background: rgb(255, 255, 255);
    border-bottom: 2px solid var(--border); /* Linha levemente mais grossa */
    padding: 18px 32px; /* Aumentei o espaçamento interno */
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(0,0,0,0.04);
  }

  .topbar-logo svg { height: 26px; display: block; }

  .topbar-divider { width: 1px; height: 22px; background: var(--border); }

  .topbar-title {
    font-family: 'Figtree', sans-serif;
    font-weight: 700; /* De 600 para 700 */
    font-size: 0.85rem; /* De 0.8rem para 0.85rem */
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #18171F;
  }
.topbar-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
.live-dot { width:8px; height:8px; border-radius:50%; background:var(--red); animation:blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
.live-label { font-size:0.65rem; font-weight:800; letter-spacing:1px; color:#aaa; text-transform:uppercase; }

/* LAYOUT - Aumentado o Grid da Esquerda */
.app { max-width:1400px; margin:0 auto; padding:20px; }

.main-grid {
  display:grid;
  grid-template-columns: 400px 1fr; /* Aumentei a largura do ranking */
  gap:24px;
  align-items:start;
}

/* SIDEBAR - PLACAR */
.sidebar {
  background: var(--surface);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid var(--border);
  display: flex; flex-direction: column; gap:10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}
.sidebar-title {
  font-size:0.85rem; font-weight:800; text-transform:uppercase; letter-spacing:1.5px;
  color:var(--muted); padding:4px 8px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between;
}

.player-card {
  padding:12px 16px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; border-radius:14px;
  transition: all 0.2s;
  border: 1px solid transparent;
  position: relative;
}
.player-card:hover { background: var(--surface2); }
.player-card.sel {
  background: var(--red-light);
  border-color: var(--red-border);
}

.player-card.shake {
  animation: shake 0.4s ease-in-out;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}

.player-avatar {
  width:54px; height:54px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.player-avatar img { 
  max-width:100%; max-height:100%; 
  object-fit:contain;
}

.player-info { 
  flex: 1; 
  min-width: 0; /* Permite que o texto quebre ou encolha se necessário */
}
.player-name { 
  font-weight:800; font-size:1.1rem; color:var(--text); 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.player-pts  { font-size:0.85rem; color:var(--muted); font-weight:600; margin-top: 2px; }

/* Correção do Alinhamento do Score */
.score-ctrl { 
  display:flex; align-items:center; gap:8px; 
  margin-left: auto; /* Empurra sempre para a direita de forma fixa */
  flex-shrink: 0; /* Impede que os botões diminuam */
}
.score-badge { 
  font-weight:900; font-size:1.3rem; width:45px; text-align:center; 
  font-variant-numeric: tabular-nums; /* Mantém números com mesma largura */
}
.score-badge.positive { color: var(--green); }
.score-badge.negative { color: var(--red); }

.btn-adj {
  border:1px solid var(--border-strong); background:#fff; color:var(--text);
  border-radius:8px; width:28px; height:28px; cursor:pointer;
  font-weight:800; font-size:16px; display:flex; align-items:center; justify-content:center;
  transition: 0.1s;
}
.btn-adj:hover { background:var(--text); color:#fff; }

/* FLYING POINT */
.point-fly {
  position: fixed;
  font-weight: 900;
  font-size: 2.5rem;
  pointer-events: none;
  z-index: 999;
  text-shadow: 0 4px 10px rgba(0,0,0,0.1);
  animation: flyUp 1.2s ease-out forwards;
}

@keyframes flyUp {
  0% { opacity: 0; transform: translateY(0) scale(0.5); }
  20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-120px) scale(1); }
}

/* CONTENT */
.content { display:flex; flex-direction:column; gap:20px; }

/* STATS */
.stats-bar {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:20px 24px;
  display:flex; align-items:center; gap:24px;
}
.stat-val { font-weight:800; font-size:2.2rem; line-height:1; }
.stat-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:6px; font-weight:700; }
.prog-wrap { flex:1; display:flex; flex-direction:column; gap:8px; }
.prog-bar { height:10px; background:var(--bg); border-radius:10px; overflow:hidden; }
.prog-fill { height:100%; background:var(--red); transition:width 0.6s ease; }

/* RAFFLE CARD */
.raffle-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:24px; overflow:hidden;
  box-shadow:0 10px 40px rgba(0,0,0,0.06);
  display: flex; flex-direction: column;
  height: 520px; 
}

.card-body {
  flex: 1;
  padding: 40px;
  display:flex; flex-direction:column; align-items:center; text-align:center;
  overflow-y: auto;
  justify-content: center;
}

.q-text {
  font-weight:800;
  font-size: clamp(1.5rem, 5vh, 2.2rem); 
  line-height:1.2; color:var(--text); 
  max-width:800px;
}
.q-text small {
  display: block; font-size: 1.2rem; color: var(--muted);
  font-weight: 500; margin-top: 20px; line-height: 1.5;
}

/* BADGES */
.badges-row { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
.badge {
  font-weight:700; font-size:0.8rem; padding:8px 16px; border-radius:30px;
  text-transform:uppercase; letter-spacing:1px;
}
.badge-cultura { background:var(--blue-light); color:var(--blue); }
.badge-produto  { background:var(--green-light); color:var(--green); }
.badge-prenda   { background:var(--gold-light); color:var(--gold); }

/* ANSWER BUTTON */
.answer-btn {
  margin-top: 30px; width:100%; max-width:480px; padding:20px;
  background:var(--surface2); border:2px dashed var(--border-strong);
  border-radius:14px; color:var(--muted); font-size:1.1rem; font-weight:700;
  cursor:pointer; transition:all 0.2s;
}
.answer-btn.revealed {
  border-style:solid; border-color:var(--green-border); background:var(--green-light); 
  color: var(--green); cursor:default;
}

/* BOTTOM CONTROLS */
.score-bar {
  display:none; align-items:center; justify-content:center; gap:16px;
  padding:24px; border-top:1px solid var(--border); background:var(--surface2);
}
.btn-action {
  padding: 16px 40px; border-radius: 12px; border: none; font-weight: 800; 
  cursor: pointer; text-transform: uppercase; font-size: 0.95rem; transition: 0.2s;
}
.btn-correct { background: var(--green); color: #fff; }
.btn-skip { background: #fff; border: 1px solid var(--border-strong); color: var(--muted); }

.action-bar {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:20px 24px;
  display:flex; align-items:center; gap:20px;
}
.btn-draw {
  background:var(--red); color:#fff; font-weight:800; font-size:1.1rem;
  padding:16px 48px; border:none; border-radius:14px; cursor:pointer;
  box-shadow:0 6px 20px rgba(232,17,45,0.3);
  text-transform: uppercase;
}
.btn-draw:disabled { opacity: 0.5; cursor: not-allowed; }

/* ANIMATIONS */
@keyframes spin-anim {
  0%{opacity:0.3; transform: scale(0.99);}
  50%{opacity:0.7; transform: scale(1.01);}
  100%{opacity:0.3; transform: scale(0.99);}
}
.spinning .q-text { animation: spin-anim 0.15s infinite; }

.toast {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  background:#111; color:#fff; padding:12px 24px; border-radius:12px;
  font-weight:600; opacity:0; pointer-events:none; transition: 0.3s; z-index: 1000;
}
.toast.show { opacity:1; }

/* PRENDA */
.prenda-title { font-weight:800; font-size:2.5rem; color:var(--gold); margin-bottom:10px; }
.prenda-rules {
  background:var(--gold-light); border-radius:16px; padding:24px;
  text-align: left; display: grid; gap: 14px; margin-top: 24px;
}
.rule-item { display: flex; gap: 12px; font-weight: 700; font-size: 1.1rem; }

</style>
</head>

  { pillar:"Prenda", type:"prenda", emoji:"😱", title:"Azar do Motorista!", sub:"Seu time perde 2 pontos imediatamente.", rules:[{i:"💀",t:"O time que sorteou perde 2 pontos agora."}], pts:-2 },
  { pillar:"Prenda", type:"prenda", emoji:"📡", title:"Radar de Pontos", sub:"Retire 1 ponto de outro time.", rules:[{i:"📡",t:"Escolha um adversário para perder 1 ponto."}], pts:0 },
  { pillar:"Prenda", type:"prenda", emoji:"🚗", title:"Marea Turbo", sub:"Tente vender esse clássico em até 1 minuto.", rules:[{i:"🎤",t:"Seja criativo no argumento de venda!"},{i:"👏",t:"Se aprovado: +3 pontos."}], pts:3 },
  { pillar:"Prenda", type:"prenda", emoji:"🤫", title:"Mímica Automotiva", sub:"Mímica de uma marca de carro.", rules:[{i:"🕐",t:"Time tem 30 segundos para adivinhar."},{i:"✅",t:"Acertou: +2 pontos."}], pts:2 },
  { pillar:"Prenda", type:"prenda", emoji:"🧩", title:"Carro Humano", sub:"Montem um carro usando os integrantes.", rules:[{i:"🧩",t:"Cada pessoa é uma peça."},{i:"✅",t:"Aprovado: +3 pontos."}], pts:3 },
  { pillar:"Prenda", type:"prenda", emoji:"🎬", title:"Teatro de Valores", sub:"Encene um valor da Webmotors.", rules:[{i:"🎭",t:"Se outro time adivinhar: +1 para ambos."}], pts:1 }
];

const TEAMS = [
  { name:"SENNA",      url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-senna?fmt=png-alpha&hei=150" },
  { name:"VETTEL",     url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-vettel?fmt=png-alpha&hei=150" },
  { name:"LAUDA",      url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-lauda?fmt=png-alpha&hei=150" },
  { name:"PROST",      url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-prost?fmt=png-alpha&hei=150" },
  { name:"HAMILTON",   url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-hamilton?fmt=png-alpha&hei=150" },
  { name:"VERSTAPPEN", url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-verstappen?fmt=png-alpha&hei=150" },
  { name:"NORIS",      url:"https://s7d1.scene7.com/is/image/Targetwebmotors/casa-noris?fmt=png-alpha&hei=150" }
];

let players = TEAMS.map((t,i) => ({id:i, name:t.name, url:t.url, score:0}));
let drawn = {};
let drawnCount = 0;
let selPlayer = null;
let currentQ = null;
let isSpinning = false;

function renderPlayers() {
  const list = document.getElementById('players-list');
  list.innerHTML = players.map(p => {
    const scoreClass = p.score >= 0 ? 'positive' : 'negative';
    return `
      <div class="player-card ${selPlayer === p.id ? 'sel' : ''}" onclick="selectPlayer(${p.id})" id="p-card-${p.id}">
        <div class="player-avatar"><img src="${p.url}" alt="${p.name}"></div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-pts">${p.score} pts</div>
        </div>
        <div class="score-ctrl" onclick="event.stopPropagation()">
          <button class="btn-adj" onclick="adj(${p.id},-1, event)">−</button>
          <div class="score-badge ${scoreClass}">${p.score}</div>
          <button class="btn-adj" onclick="adj(${p.id},1, event)">+</button>
        </div>
      </div>
    `;
  }).join('');
}

function selectPlayer(id) {
  selPlayer = id;
  document.getElementById('player-indicator').innerHTML = `Piloto: <strong style="color:var(--red)">${players[id].name}</strong>`;
  renderPlayers();
}

function triggerFlyPoint(x, y, val) {
  const fly = document.createElement('div');
  fly.className = 'point-fly';
  fly.textContent = val > 0 ? `+${val}` : val;
  fly.style.color = val > 0 ? 'var(--green)' : 'var(--red)';
  fly.style.left = `${x}px`;
  fly.style.top = `${y}px`;
  document.body.appendChild(fly);
  setTimeout(() => fly.remove(), 1200);
}

function triggerShake(id) {
  const el = document.getElementById(`p-card-${id}`);
  if (el) {
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 400);
  }
}

function adj(id, v, event) {
  players[id].score += v;
  let x, y;
  if (event && event.clientX) {
    x = event.clientX; y = event.clientY;
  } else {
    const rect = document.getElementById(`p-card-${id}`).getBoundingClientRect();
    x = rect.left + rect.width / 2; y = rect.top + rect.height / 2;
  }
  triggerFlyPoint(x, y, v);
  if (v < 0) triggerShake(id);
  renderPlayers();
}

function updateStats() {
  const total = QUESTIONS.length;
  const pct = Math.round((drawnCount / total) * 100);
  document.getElementById('stat-drawn').textContent = drawnCount;
  document.getElementById('stat-left').textContent = total - drawnCount;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('pct-label').textContent = pct + '%';
}

function drawQuestion() {
  if (isSpinning || selPlayer === null) {
    if (selPlayer === null) showToast('Selecione uma escuderia primeiro!');
    return;
  }
  const avail = QUESTIONS.map((_, i) => i).filter(i => !drawn[i]);
  if (!avail.length) { showToast('Bandeirada final! Todas as perguntas foram feitas.'); return; }

  isSpinning = true;
  document.getElementById('btn-draw').disabled = true;
  document.getElementById('waiting-state').style.display = 'none';
  document.getElementById('question-state').style.display = 'flex';
  document.getElementById('score-bar').style.display = 'none';
  
  const body = document.getElementById('card-body');
  body.classList.add('spinning');

  let ticks = 0;
  const iv = setInterval(() => {
    const r = QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)];
    document.getElementById('q-text').textContent = (r.q || r.title).split('\n')[0];
    ticks++;
    if (ticks > 15) {
      clearInterval(iv);
      body.classList.remove('spinning');
      const idx = avail[Math.floor(Math.random() * avail.length)];
      drawn[idx] = true;
      drawnCount++;
      currentQ = QUESTIONS[idx];
      renderQuestion(currentQ);
      isSpinning = false;
      document.getElementById('btn-draw').disabled = false;
    }
  }, 100);
}

function renderQuestion(q) {
  const isPrenda = q.type === 'prenda';
  const textEl = document.getElementById('q-text');
  const pill = document.getElementById('pillar-badge');
  const pts = document.getElementById('pts-badge');
  const ansBtn = document.getElementById('answer-btn');

  pill.textContent = q.pillar;
  pill.className = 'badge badge-' + q.pillar.toLowerCase();
  
  if (isPrenda) {
    pts.textContent = q.pts > 0 ? `ATÉ +${q.pts} PTS` : (q.pts < 0 ? `${q.pts} PTS` : 'BÔNUS');
    textEl.innerHTML = `
      <div class="prenda-title">${q.emoji} ${q.title}</div>
      <div style="font-weight:600; color:var(--text2); margin-bottom:15px; font-size:1.3rem;">${q.sub}</div>
      <div class="prenda-rules">
        ${q.rules.map(r => `<div class="rule-item"><span>${r.i}</span><span>${r.t}</span></div>`).join('')}
      </div>
    `;
    ansBtn.style.display = 'none';
    document.getElementById('score-bar').style.display = 'flex';
    if (q.pts < 0) setTimeout(() => adj(selPlayer, q.pts), 800);
  } else {
    pts.textContent = '1 PONTO';
    const lines = q.q.split('\n');
    textEl.innerHTML = lines[0] + (lines[1] ? `<small>${lines.slice(1).join('\n')}</small>` : '');
    ansBtn.style.display = 'block';
    ansBtn.className = 'answer-btn';
    ansBtn.textContent = 'VER RESPOSTA';
  }
  updateStats();
}

function revealAnswer() {
  const btn = document.getElementById('answer-btn');
  btn.className = 'answer-btn revealed';
  btn.textContent = currentQ.a;
  document.getElementById('score-bar').style.display = 'flex';
}

function markCorrect() {
  const val = currentQ.type === 'prenda' ? Math.max(0, currentQ.pts || 0) : 1;
  if (val > 0) adj(selPlayer, val);
  document.getElementById('score-bar').style.display = 'none';
  showToast('Ponto computado!');
}

function skipQ() {
  document.getElementById('score-bar').style.display = 'none';
  showToast('Pane seca! Sem pontos.');
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderPlayers();
updateStats();
</script>
</body>
</html>
